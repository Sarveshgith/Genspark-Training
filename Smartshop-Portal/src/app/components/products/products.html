<main class="max-w-4xl mx-auto mt-8 p-4">
  <h1 class="text-xl font-bold mb-4">Explore Products</h1>
  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
    @for (product of products(); track product.id) {
    <div class="p-3 border border-gray-300 rounded bg-white flex flex-col justify-between">
      <div>
        <img [src]="product.thumbnail" [alt]="product.title" class="w-full h-32 object-cover rounded mb-2">
        <h2 class="font-semibold text-sm text-gray-800">{{ product.title }}</h2>
        <p class="text-xs text-gray-500 mt-1">Rating: {{ product.rating }}</p>
      </div>
      <div class="mt-3 flex justify-between items-center">
        <span class="font-bold text-gray-900">${{ product.price }}</span>
        <a [routerLink]="'/product/' + product.id" class="text-xs text-blue-600 hover:underline">View Details</a>
      </div>
    </div>
    } @empty {
    <p class="col-span-full text-gray-500 text-sm">No products found.</p>
    }
  </div>
</main>
