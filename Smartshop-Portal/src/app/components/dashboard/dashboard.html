@if (user$ | async; as user) {
  <div class="max-w-md mx-auto mt-8 p-6 bg-white border border-gray-200 rounded shadow-sm">
    <h2 class="text-xl font-bold text-gray-800 mb-4">Welcome, {{ user.firstName }} {{ user.lastName }}</h2>
    
    <div class="border-t border-gray-100 my-4"></div>
    
    <div class="space-y-3">
      <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wider">Navigation</h3>
      <nav class="flex flex-col gap-2">
        <a routerLink="/products" class="px-4 py-2 border border-gray-200 rounded text-blue-600 hover:bg-gray-50 transition text-sm font-medium">
          Products
        </a>
        <a routerLink="/product/1" class="px-4 py-2 border border-gray-200 rounded text-blue-600 hover:bg-gray-50 transition text-sm font-medium">
          Product Details
        </a>
        <a routerLink="/profile" class="px-4 py-2 border border-gray-200 rounded text-blue-600 hover:bg-gray-50 transition text-sm font-medium">
          Profile
        </a>
      </nav>
    </div>
  </div>
}
