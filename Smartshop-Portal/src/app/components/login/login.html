<section class="max-w-sm mx-auto mt-12 p-4 bg-white border border-gray-300 rounded">
  <h2 class="text-xl font-bold mb-4">Login</h2>

  <form (ngSubmit)="onSubmit()" class="space-y-3">
    <div>
      <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username:</label>
      <input type="text" id="username" [formField]="loginForm.username"
        class="w-full px-3 py-1.5 border border-gray-300 rounded text-sm focus:outline-none focus:border-blue-500">

      @for (error of loginForm.username().errors(); track error.message) {
        <span class="block text-xs text-red-500 mt-1">{{ error.message }}</span>
      }
    </div>
    
    <div>
      <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password:</label>
      <input type="password" id="password" [formField]="loginForm.password"
        class="w-full px-3 py-1.5 border border-gray-300 rounded text-sm focus:outline-none focus:border-blue-500">

      @for (error of loginForm.password().errors(); track error.message) {
        <span class="block text-xs text-red-500 mt-1">{{ error.message }}</span>
      }
    </div>
    
    <button [disabled]="progress() || loginForm().invalid()" type="submit"
      class="w-full py-2 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded text-sm disabled:bg-gray-200 disabled:text-gray-400 transition">
      Login
      @if (progress()){
        <span class="inline-block w-3 h-3 border border-gray-400 border-t-transparent rounded-full animate-spin ml-1"></span>
      }
    </button>
  </form>
</section>
