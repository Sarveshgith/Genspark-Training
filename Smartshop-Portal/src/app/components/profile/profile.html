@if (user$ | async; as user) {
  <div class="max-w-md mx-auto mt-8 p-4 border border-gray-300 rounded bg-white">
    <h2 class="text-xl font-bold mb-4">User Profile</h2>
    <div class="space-y-2 text-sm text-gray-700">
      @if (user.image) {
        <img [src]="user.image" alt="Profile Picture" class="w-20 h-20 rounded border mb-4">
      }
      <p><strong>First Name:</strong> {{ user.firstName }}</p>
      <p><strong>Last Name:</strong> {{ user.lastName }}</p>
      <p><strong>Username:</strong> {{ user.username }}</p>
      <p><strong>Email:</strong> {{ user.email }}</p>
      <p><strong>Gender:</strong> {{ user.gender }}</p>
      <p><strong>User ID:</strong> #{{ user.id }}</p>
    </div>
    <button (click)="logout()" class="mt-4 px-3 py-1.5 bg-red-600 hover:bg-red-700 text-white rounded text-sm font-semibold transition">
      Log Out
    </button>
  </div>
}
