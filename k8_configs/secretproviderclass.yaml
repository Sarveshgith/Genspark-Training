# ============================================================================
# SecretProviderClass
# ----------------------------------------------------------------------------
# Purpose: Retrieves secrets from Azure Key Vault using Workload Identity
#          and mounts them as files at /mnt/secrets-store/<objectName>.
#
# ASP.NET Core reads these files directly at startup via a custom
# configuration provider in Program.cs — no Kubernetes Secret sync needed.
# ============================================================================
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: restaurant-keyvault
  namespace: $KUBERNETES_NAMESPACE
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: "$WORKLOAD_IDENTITY_CLIENT_ID"
    keyvaultName: "$KEYVAULT_NAME"
    tenantId: "$TENANT_ID"
    objects: |
      array:
        - |
          objectName: ConnectionStrings--DefaultConnection
          objectType: secret
        - |
          objectName: JwtSettings--SecretKey
          objectType: secret
        - |
          objectName: JwtSettings--RefreshKey
          objectType: secret
        - |
          objectName: JwtSettings--Issuer
          objectType: secret
        - |
          objectName: JwtSettings--Audience
          objectType: secret
        - |
          objectName: Gemini--ApiKey
          objectType: secret
        - |
          objectName: SignalR--ConnectionString
          objectType: secret