# ============================================================================
# Service Account
# ----------------------------------------------------------------------------
# Purpose:
#   Allows application pods to authenticate with Azure using
#   Azure Workload Identity.
# ============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: $SERVICE_ACCOUNT_NAME
  namespace: $KUBERNETES_NAMESPACE
  annotations:
    # Azure Workload Identity client ID of the User Assigned Managed Identity
    azure.workload.identity/client-id: "$WORKLOAD_IDENTITY_CLIENT_ID"
  labels:
    app.kubernetes.io/name: restaurant-api
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: restaurant-management-system