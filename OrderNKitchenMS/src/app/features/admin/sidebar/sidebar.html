<!-- MOBILE HAMBURGER BUTTON (Visible only on mobile, fixed at top-left) -->
<button (click)="toggleMobileMenu()"
  class="fixed top-4 left-4 z-50 md:hidden p-2 rounded-lg bg-white border border-gray-150 shadow-sm text-gray-500 hover:text-gray-700 focus:outline-none transition-all duration-200"
  aria-label="Toggle Navigation Menu">
  @if (isMobileMenuOpen()) {
  <!-- Close Icon -->
  <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
  </svg>
  } @else {
  <!-- Hamburger Icon -->
  <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
    <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
  </svg>
  }
</button>

<!-- MOBILE DRAWER BACKDROP (Visible only on mobile when menu is open) -->
@if (isMobileMenuOpen()) {
<div (click)="closeMobileMenu()"
  class="fixed inset-0 bg-black/40 backdrop-blur-sm z-40 md:hidden transition-opacity duration-300"></div>
}

<!-- SIDEBAR CONTAINER (Responsive layout: side-bar on desktop, slide-out drawer on mobile) -->
<aside [class]="'w-64 bg-[#F9F6F3] border-r border-[#EFECE9] flex flex-col justify-between h-screen sticky top-0 select-none shrink-0 z-45 transition-transform duration-300 ease-in-out ' +
           'fixed md:sticky inset-y-0 left-0 md:transform-none ' +
           (isMobileMenuOpen() ? 'translate-x-0' : '-translate-x-full md:translate-x-0')">
  <div class="p-6 pt-16 md:pt-6">
    <!-- Brand Logo -->
    <div class="mb-10 flex flex-col items-start">
      <img src="/logo.png" class="w-10 h-10 object-contain mb-3" alt="Ambrosia Logo" />
      <h1 class="text-2xl font-bold tracking-widest text-[#8C5815] font-serif leading-none">AMBROSIA</h1>
      <p class="text-[9px] tracking-[0.2em] text-gray-400 font-semibold mt-1.5 uppercase">Fine Dining Management</p>
    </div>

    <!-- Navigation Links -->
    <nav class="space-y-1.5">
      <a routerLink="/dashboard"
        routerLinkActive="bg-[#FAF4EC] text-[#8C5815] border-r-4 border-[#8C5815] font-semibold"
        [routerLinkActiveOptions]="{exact: true}" (click)="closeMobileMenu()"
        class="flex items-center space-x-3 px-4 py-2.5 rounded-lg text-gray-500 hover:bg-[#F0EDE9] hover:text-gray-800 transition-all duration-200 cursor-pointer">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M3.75 6A2.25 2.25 0 0 1 6 3.75h2.25A2.25 2.25 0 0 1 10.5 6v2.25a2.25 2.25 0 0 1-2.25 2.25H6a2.25 2.25 0 0 1-2.25-2.25V6ZM3.75 15.75A2.25 2.25 0 0 1 6 13.5h2.25a2.25 2.25 0 0 1 2.25 2.25V18a2.25 2.25 0 0 1-2.25 2.25H6A2.25 2.25 0 0 1 3.75 18v-2.25ZM13.5 6a2.25 2.25 0 0 1 2.25-2.25H18A2.25 2.25 0 0 1 20.25 6v2.25A2.25 2.25 0 0 1 18 10.5h-2.25a2.25 2.25 0 0 1-2.25-2.25V6ZM13.5 15.75a2.25 2.25 0 0 1 2.25-2.25H18a2.25 2.25 0 0 1 2.25 2.25V18A2.25 2.25 0 0 1 18 20.25h-2.25A2.25 2.25 0 0 1 13.5 18v-2.25Z" />
        </svg>
        <span class="text-sm font-medium">DASHBOARD</span>
      </a>

      <a routerLink="/orders" routerLinkActive="bg-[#FAF4EC] text-[#8C5815] border-r-4 border-[#8C5815] font-semibold"
        (click)="closeMobileMenu()"
        class="flex items-center space-x-3 px-4 py-2.5 rounded-lg text-gray-500 hover:bg-[#F0EDE9] hover:text-gray-800 transition-all duration-200 cursor-pointer">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 0 0 2.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 0 0-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 0 0 .75-.75 2.25 2.25 0 0 0-.1-.664m-5.8 0A2.251 2.251 0 0 1 13.5 2.25H15c1.03 0 1.9.693 2.166 1.638m-7.377 17.03c-2.752-.317-5.09-2.29-5.83-4.971a3.478 3.478 0 0 1-.252-1.3v-5.902c0-1.135.845-2.098 1.976-2.192a48.424 48.424 0 0 1 1.123-.08M20.25 10.5a8.25 8.25 0 0 1-16.5 0v-3.75" />
        </svg>
        <span class="text-sm font-medium">ORDERS</span>
      </a>

      <a routerLink="/tables" routerLinkActive="bg-[#FAF4EC] text-[#8C5815] border-r-4 border-[#8C5815] font-semibold"
        (click)="closeMobileMenu()"
        class="flex items-center space-x-3 px-4 py-2.5 rounded-lg text-gray-500 hover:bg-[#F0EDE9] hover:text-gray-800 transition-all duration-200 cursor-pointer">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M12 21a9.004 9.004 0 0 0 8.716-6.747M12 21a9.004 9.004 0 0 1-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 0 1 7.843 4.582M12 3a8.997 8.997 0 0 0-7.843 4.582m15.686 0A11.953 11.953 0 0 1 12 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0 1 21 12c0 .778-.099 1.533-.284 2.253m0 0A17.919 17.919 0 0 1 12 16.5c-3.162 0-6.133-.815-8.716-2.247m0 0A9.015 9.015 0 0 1 3 12c0-.778.099-1.533.284-2.253" />
        </svg>
        <span class="text-sm font-medium">TABLES</span>
      </a>

      <a routerLink="/waiter/menu"
        routerLinkActive="bg-[#FAF4EC] text-[#8C5815] border-r-4 border-[#8C5815] font-semibold"
        (click)="closeMobileMenu()"
        class="flex items-center space-x-3 px-4 py-2.5 rounded-lg text-gray-500 hover:bg-[#F0EDE9] hover:text-gray-800 transition-all duration-200 cursor-pointer">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M12 6.042A8.967 8.967 0 0 0 6 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 0 1 6 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 0 1 6-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0 0 18 18a8.967 8.967 0 0 0-6 2.292m0-14.25v14.25" />
        </svg>
        <span class="text-sm">MENU</span>
      </a>

      <a routerLink="/staff" routerLinkActive="bg-[#FAF4EC] text-[#8C5815] border-r-4 border-[#8C5815] font-semibold"
        (click)="closeMobileMenu()"
        class="flex items-center space-x-3 px-4 py-2.5 rounded-lg text-gray-500 hover:bg-[#F0EDE9] hover:text-gray-800 transition-all duration-200 cursor-pointer">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M18 18.72a9.094 9.094 0 0 0 3.741-.479 3 3 0 0 0-4.682-2.72m.94 3.198.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0 1 12 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 0 1 6 18.719m12 0a5.971 5.971 0 0 0-.941-3.197m0 0A5.995 5.995 0 0 0 12 12.75a5.995 5.995 0 0 0-5.058 2.772m0 0a3 3 0 0 0-4.681 2.72 8.986 8.986 0 0 0 3.74.477m.94-3.197a5.971 5.971 0 0 0-.94-3.197M15 6.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Zm6 3a2.25 2.25 0 1 1-4.5 0 2.25 2.25 0 0 1 4.5 0Zm-13.5 0a2.25 2.25 0 1 1-4.5 0 2.25 2.25 0 0 1 4.5 0Z" />
        </svg>
        <span class="text-sm font-medium">STAFF</span>
      </a>
    </nav>
  </div>

  <!-- Bottom Links -->
  <div class="p-6 border-t border-[#EFECE9] space-y-1.5">
    <a routerLink="/settings" routerLinkActive="bg-[#FAF4EC] text-[#8C5815] border-r-4 border-[#8C5815]"
      (click)="closeMobileMenu()"
      class="flex items-center space-x-3 px-4 py-2 rounded-lg text-gray-500 hover:bg-[#F0EDE9] hover:text-gray-800 transition-all duration-200 cursor-pointer">
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.43l-1.003.828c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.43l1.004-.827c.292-.24.437-.613.43-.991a6.936 6.936 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28Z" />
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
      </svg>
      <span class="text-xs font-semibold">SETTINGS</span>
    </a>

    <a (click)="logout()"
      class="flex items-center space-x-3 px-4 py-2 rounded-lg text-gray-500 hover:bg-red-50 hover:text-red-600 transition-all duration-200 cursor-pointer">
      <svg class="w-5 h-5 text-gray-400 group-hover:text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"
        stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15M12 9l-3 3m0 0 3 3m-3-3h12.75" />
      </svg>
      <span class="text-xs font-semibold">LOGOUT</span>
    </a>
  </div>
</aside>
