<header class="w-full bg-[#F9F6F3] border-b border-[#EFECE9] select-none sticky top-0 z-40">
  <div class="max-w-7xl mx-auto px-4 md:px-6 py-3.5 flex items-center justify-between gap-3">
    
    <!-- Brand Logo -->
    <div class="flex flex-col shrink-0">
      <h1 class="text-lg md:text-xl font-bold tracking-widest text-[#8C5815] font-serif leading-none">AMBROSIA</h1>
      <span class="text-[7px] md:text-[8px] tracking-[0.2em] text-gray-400 font-semibold mt-0.5 uppercase">Staff Nav</span>
    </div>

    <!-- Navigation Tabs -->
    <nav class="flex items-center space-x-4 md:space-x-8">
      <a
        routerLink="/waiter/tables"
        routerLinkActive="text-[#8C5815] border-[#8C5815]"
        [routerLinkActiveOptions]="{exact: true}"
        class="text-xs md:text-sm font-semibold text-gray-500 hover:text-gray-800 py-2 border-b-2 border-transparent transition-all duration-200 cursor-pointer uppercase tracking-wider font-outfit"
      >
        Tables
      </a>
      <a
        routerLink="/waiter/menu"
        routerLinkActive="text-[#8C5815] border-[#8C5815]"
        class="text-xs md:text-sm font-semibold text-gray-500 hover:text-gray-800 py-2 border-b-2 border-transparent transition-all duration-200 cursor-pointer uppercase tracking-wider font-outfit"
      >
        Menu
      </a>
    </nav>

    <!-- Right Side Actions -->
    <div class="flex items-center space-x-3 md:space-x-6 shrink-0">
      <!-- Live Connected status (Icon + text on md/lg, just icon on sm/xs) -->
      <div class="flex items-center space-x-1.5 md:space-x-2 bg-[#FAF4EC] px-2 md:px-3 py-1 rounded-full border border-[#8C5815]/10">
        <span class="w-2 h-2 rounded-full bg-[#1E7E34] animate-pulse"></span>
        <span class="hidden sm:inline text-[9px] font-bold text-[#8C5815] uppercase tracking-wider font-outfit">Live Connected</span>
      </div>

      <!-- Notification Bell -->
      <button class="text-gray-400 hover:text-gray-650 transition-colors duration-200 relative cursor-pointer">
        <svg class="w-4 h-4 md:w-5 md:h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a9.04 9.04 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0M3.124 7.5A8.969 8.969 0 0 1 5.292 3m13.416 4.5A8.969 8.969 0 0 0 18.708 3M9 1H1.5M12 2v20m-5-2h10" />
        </svg>
      </button>

      <!-- Logout -->
      <button
        (click)="logout()"
        class="flex items-center space-x-1 md:space-x-2 text-[10px] md:text-xs font-semibold text-gray-400 hover:text-red-600 transition-colors duration-200 cursor-pointer uppercase tracking-wider font-outfit"
      >
        <svg class="w-3.5 h-3.5 md:w-4 md:h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15M12 9l-3 3m0 0 3 3m-3-3h12.75" />
        </svg>
        <span>Logout</span>
      </button>
    </div>
  </div>
</header>
