@if (isOpen) {
  <div class="bg-[#F9F6F3] border border-[#EFECE9] rounded-2xl p-5 mb-6 shadow-inner flex flex-col md:flex-row gap-5 items-end justify-between transition-all duration-350 animate-scale-in">
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 flex-1 w-full">
      <!-- Min Price -->
      <div class="flex flex-col space-y-1 font-sans">
        <label class="text-[10px] font-bold text-gray-400 uppercase">Min Price ($)</label>
        <input
          type="number"
          [ngModel]="minPrice"
          (ngModelChange)="minPriceChange.emit($event)"
          placeholder="Any Min"
          class="bg-white text-gray-800 border border-[#EFECE9] rounded-lg px-3 py-2 text-xs focus:ring-1 focus:ring-[#8C5815]/30 focus:border-[#8C5815]/30 outline-none w-full shadow-sm"
        />
      </div>

      <!-- Max Price -->
      <div class="flex flex-col space-y-1 font-sans">
        <label class="text-[10px] font-bold text-gray-400 uppercase">Max Price ($)</label>
        <input
          type="number"
          [ngModel]="maxPrice"
          (ngModelChange)="maxPriceChange.emit($event)"
          placeholder="Any Max"
          class="bg-white text-gray-800 border border-[#EFECE9] rounded-lg px-3 py-2 text-xs focus:ring-1 focus:ring-[#8C5815]/30 focus:border-[#8C5815]/30 outline-none w-full shadow-sm"
        />
      </div>

      <!-- Max Preparation Time -->
      <div class="flex flex-col space-y-1 font-sans">
        <label class="text-[10px] font-bold text-gray-400 uppercase">Max Prep Time (Mins)</label>
        <input
          type="number"
          [ngModel]="maxPrepTime"
          (ngModelChange)="maxPrepTimeChange.emit($event)"
          placeholder="Any Prep Time"
          class="bg-white text-gray-800 border border-[#EFECE9] rounded-lg px-3 py-2 text-xs focus:ring-1 focus:ring-[#8C5815]/30 focus:border-[#8C5815]/30 outline-none w-full shadow-sm"
        />
      </div>

      <!-- Stock Availability -->
      <div class="flex flex-col space-y-1 font-sans">
        <label class="text-[10px] font-bold text-gray-400 uppercase">Stock Status</label>
        <select
          [ngModel]="availability"
          (ngModelChange)="availabilityChange.emit($event)"
          class="bg-white text-gray-800 border border-[#EFECE9] rounded-lg px-3 py-2 text-xs focus:ring-1 focus:ring-[#8C5815]/30 focus:border-[#8C5815]/30 outline-none w-full shadow-sm"
        >
          <option value="all">All Items</option>
          <option value="available">Available Only</option>
          <option value="outofstock">Out of Stock Only</option>
        </select>
      </div>
    </div>

    <!-- Buttons -->
    <div class="flex items-center space-x-3 shrink-0 w-full md:w-auto justify-end">
      <button
        (click)="clear.emit()"
        class="px-4 py-2 border border-gray-200 text-gray-500 hover:text-gray-700 bg-white rounded-lg text-xs font-semibold transition-all duration-200 shadow-sm"
      >
        Clear Filters
      </button>
      <button
        (click)="apply.emit()"
        class="px-5 py-2 bg-[#8C5815] hover:bg-[#72450F] text-white rounded-lg text-xs font-semibold transition-all duration-200 shadow-md hover:shadow-lg"
      >
        Apply Filters
      </button>
    </div>
  </div>
}
