name: Continuous Integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      #########################################################
      # .NET
      #########################################################

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet Packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}

      - name: Restore API
        run: |
          dotnet restore OrderNKitchenMS-Engine/OrderNKitchenMS-API/OrderNKitchenMS-API.csproj

      - name: Build API
        run: |
          dotnet build \
          OrderNKitchenMS-Engine/OrderNKitchenMS-API/OrderNKitchenMS-API.csproj \
          --configuration Release \
          --no-restore

      - name: Run Unit Tests
        run: |
          dotnet test \
          OrderNKitchenMS-Engine/OrderNKitchenMS-API.Test/OrderNKitchenMS-API.Test.csproj \
          --configuration Release \
          --verbosity normal

      #########################################################
      # Angular
      #########################################################

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: OrderNKitchenMS/package-lock.json

      - name: Install Packages
        working-directory: OrderNKitchenMS
        run: npm ci

      - name: Build Angular
        working-directory: OrderNKitchenMS
        run: |
          npm run build -- --configuration production

      #########################################################
      # Docker
      #########################################################

      - name: Build Docker Image
        run: |
          docker build \
          -t restaurant-api:ci \
          OrderNKitchenMS-Engine