name: Deploy Frontend to Azure Static Web Apps

on:
  push:
    branches: [main]
    paths:
      - 'OrderNKitchenMS/**'
      - '.github/workflows/deploy-web.yml'

  workflow_dispatch:

jobs:
  deploy:

    runs-on: ubuntu-latest

    steps:

      #########################################################
      # Checkout
      #########################################################

      - name: Checkout Repository
        uses: actions/checkout@v4

      #########################################################
      # Setup Node
      #########################################################

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: OrderNKitchenMS/package-lock.json

      #########################################################
      # Install Dependencies
      #########################################################

      - name: Install Packages
        working-directory: OrderNKitchenMS
        run: npm ci

      #########################################################
      # Build Angular
      #########################################################

      - name: Build Angular
        working-directory: OrderNKitchenMS
        run: npm run build -- --configuration production

      #########################################################
      # Verify Build Output
      #########################################################

      - name: Verify Build
        run: |
          ls -la OrderNKitchenMS/dist/OrderNKitchenMS/browser
          test -f OrderNKitchenMS/dist/OrderNKitchenMS/browser/index.html
          test -f OrderNKitchenMS/dist/OrderNKitchenMS/browser/staticwebapp.config.json

      #########################################################
      # Deploy
      #########################################################

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}

          action: upload

          app_location: OrderNKitchenMS/dist/OrderNKitchenMS/browser

          skip_app_build: true